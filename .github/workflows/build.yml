name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Inject version into Info.plist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" Info.plist

      - name: Build
        run: bash build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalendarWeek-${{ steps.version.outputs.version }}
          path: build/CalendarWeek.app
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into Info.plist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" Info.plist

      - name: Build
        run: bash build.sh

      - name: Package app
        run: |
          cd build
          zip -r "CalendarWeek-${{ steps.version.outputs.version }}.zip" CalendarWeek.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: build/CalendarWeek-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
